name: 🐋 Docker Build & Push → mydreamnet

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/poster/**'
      - 'packages/organs/**'
      - 'Dockerfile'
      - 'packages/api/Dockerfile'
  workflow_dispatch:

jobs:
  build-api:
    name: 🦞 Build & Push dreamnet-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dreamnet-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            mydreamnet/dreamnet-api:latest
            mydreamnet/dreamnet-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔔 IFTTT — API Build Success
        if: success()
        run: |
          curl -s -X POST \
            "https://maker.ifttt.com/trigger/docker_build_success/with/key/${{ secrets.IFTTT_WEBHOOK_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"value1":"dreamnet-api","value2":"${{ github.sha }}","value3":"Image pushed to mydreamnet/dreamnet-api:latest ✔️"}'

      - name: 🚨 IFTTT — API Build Failed
        if: failure()
        run: |
          curl -s -X POST \
            "https://maker.ifttt.com/trigger/docker_build_fail/with/key/${{ secrets.IFTTT_WEBHOOK_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"value1":"dreamnet-api","value2":"${{ github.sha }}","value3":"BUILD FAILED — check GitHub Actions now"}'

  build-web:
    name: 🌊 Build & Push dreamnet-web
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dreamnet-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            mydreamnet/dreamnet-web:latest
            mydreamnet/dreamnet-web:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔔 IFTTT — All Builds Succeeded
        if: success()
        run: |
          curl -s -X POST \
            "https://maker.ifttt.com/trigger/docker_build_success/with/key/${{ secrets.IFTTT_WEBHOOK_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"value1":"dreamnet-web","value2":"${{ github.sha }}","value3":"All images live — Railway will auto-redeploy 🚀"}'

      - name: 🚨 IFTTT — Web Build Failed
        if: failure()
        run: |
          curl -s -X POST \
            "https://maker.ifttt.com/trigger/docker_build_fail/with/key/${{ secrets.IFTTT_WEBHOOK_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"value1":"dreamnet-web","value2":"${{ github.sha }}","value3":"Web build FAILED — check GitHub Actions now"}'
