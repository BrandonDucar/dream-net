name: Secret Guardian

on:
  pull_request:
  push:
    branches: [main, "compat/**"]

jobs:
  env-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block committed env artifacts
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -Ev '(\.env\.example|\.env\.sample|\.env\.template)$' || true)"
          if [ -n "$bad" ]; then
            echo "Committed env artifacts are not allowed:"
            echo "$bad"
            exit 1
          fi
      - name: Check tracked files for obvious ClawdChat tokens
        run: |
          set -euo pipefail
          hits="$(git grep -n -E 'clawdchat_[A-Za-z0-9_-]{20,}' -- ':!SECURITY.md' ':!.github/workflows/secret-guardian.yml' || true)"
          if [ -n "$hits" ]; then
            echo "Potential ClawdChat token found in tracked files:"
            echo "$hits"
            exit 1
          fi
