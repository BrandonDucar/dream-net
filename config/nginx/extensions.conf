user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─────────────────────────────────────────────────────────────────────
    # DOCKER EXTENSION GATEWAY
    # Routes extension requests to appropriate backends
    # ─────────────────────────────────────────────────────────────────────

    upstream portainer_backend {
        server local-manager:9000;
    }

    upstream temporal_ui_backend {
        server temporal-ui:8080;
    }

    upstream openwebui_backend {
        server openwebui:8080;
    }

    upstream dreamnet_api {
        server control-core:3000;
    }

    upstream signal_screener {
        server signal-screener:3203;
    }

    upstream arya_executor {
        server arya-executor:3204;
    }

    # ─────────────────────────────────────────────────────────────────────
    # HTTPS REDIRECT
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────────────────────────
    # MAIN GATEWAY
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost *.dreamnet.local;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ───────────────────────────────────────────────────────────────
        # PORTAINER UI ROUTE (Docker Management)
        # ───────────────────────────────────────────────────────────────
        location /extensions/portainer/ {
            proxy_pass http://portainer_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # ───────────────────────────────────────────────────────────────
        # TEMPORAL WORKFLOW UI
        # ───────────────────────────────────────────────────────────────
        location /extensions/temporal/ {
            proxy_pass http://temporal_ui_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ───────────────────────────────────────────────────────────────
        # OPENWEBUI LLM INTERFACE
        # ───────────────────────────────────────────────────────────────
        location /extensions/webui/ {
            proxy_pass http://openwebui_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # ───────────────────────────────────────────────────────────────
        # DREAMNET CONTROL-CORE API
        # ───────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://dreamnet_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;
        }

        # ───────────────────────────────────────────────────────────────
        # SIGNAL SCREENER (Data Hub)
        # ───────────────────────────────────────────────────────────────
        location /signal-screener/ {
            proxy_pass http://signal_screener/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────────────────────────────────
        # ARYA EXECUTOR (Social Game)
        # ───────────────────────────────────────────────────────────────
        location /arya/ {
            proxy_pass http://arya_executor/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────────────────────────────────
        # EXTENSION HEALTH CHECK
        # ───────────────────────────────────────────────────────────────
        location /extensions/health {
            access_log off;
            return 200 '{"status":"operational","timestamp":"'$(date -u +%FT%TZ)'"}';
            add_header Content-Type application/json;
        }

        # ───────────────────────────────────────────────────────────────
        # GATEWAY STATUS
        # ───────────────────────────────────────────────────────────────
        location / {
            return 200 '{"gateway":"dreamnet-extensions-proxy","version":"1.0","services":["portainer","temporal","openwebui","api","signal-screener","arya"]}';
            add_header Content-Type application/json;
        }
    }
}
