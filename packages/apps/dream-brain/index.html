<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamNet Brain | Interactive Swarm Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tensorspace/dist/tensorspace.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        #container {
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .hud-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 300px;
            pointer-events: all;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stat {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .stat-value {
            color: var(--primary);
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.cdc { background: #00f2ff; }
        .dot.ghost { background: #ff00ff; }
        .dot.pathogen { background: #ff3c00; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="hud-card">
            <h1>DreamNet Brain</h1>
            <p style="font-size: 12px; color: #888;">TensorSpace.js Visualization | Neural Topology</p>
            <div class="stat">Swarm Intelligence: <span class="stat-value">CONNECTED</span></div>
            <div class="stat">Active Agents: <span class="stat-value">17,000</span></div>
            <div class="stat">Herd Immunity: <span class="stat-value">99.4%</span></div>
        </div>
        
        <div class="hud-card" id="agent-details" style="display: none;">
            <h2 id="agent-id" style="font-size: 18px; margin: 0;">Agent Detail</h2>
            <div class="stat">Current Task: <span id="agent-task" class="stat-value">-</span></div>
            <div class="stat">Guild: <span id="agent-guild" class="stat-value">-</span></div>
        </div>
    </div>

    <div id="container"></div>

    <div class="legend">
        <div class="legend-item"><div class="dot cdc"></div> CDC Guild</div>
        <div class="legend-item"><div class="dot ghost"></div> Ghost Guild</div>
        <div class="legend-item"><div class="dot pathogen"></div> Pathogen (Isolated)</div>
    </div>

    <script>
        // TensorSpace Visualization Logic
        let container = document.getElementById( "container" );
        
        // Initialize TensorSpace Model
        let model = new TSP.models.Sequential( container );

        // Map DreamNet as a 3D Neural Architecture
        // 1. Input Layer (Sensor Layer - Mosquito Drones)
        model.add( new TSP.layers.GreyscaleInput( { shape: [ 28, 28, 1 ] } ) );
        
        // 2. Processing Layer (CDC & Ghost Guilds)
        model.add( new TSP.layers.Conv2d( { kernelSize: 5, filters: 6, strides: 1, padding: "same" } ) );
        
        // 3. Synthesis Layer (ResearchHub Foundation)
        model.add( new TSP.layers.Pooling2d( { poolSize: [ 2, 2 ], strides: [ 2, 2 ] } ) );
        
        // 4. Action Layer (Swarm Execution)
        model.add( new TSP.layers.Dense( { units: 10 } ) );

        // Load and Init
        model.init( function() {
            console.log( "DreamNet Brain Visualized." );
        } );
    </script>
</body>
</html>
